<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>help, i need coffee.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --sage: #E8F0E4;
    --sage-deep: #C5D9BC;
    --sage-muted: #D4E2CC;
    --cream: #FFFDF7;
    --cream-warm: #FFF8ED;
    --blush: #E8A0BF;
    --blush-light: #F2C6D9;
    --blush-pale: #FAEAF1;
    --terracotta: #C1796B;
    --terracotta-warm: #D4897A;
    --terracotta-deep: #A8655A;
    --charcoal: #2D3436;
    --charcoal-soft: #4A4E50;
    --charcoal-muted: #6B7072;
    --font-primary: 'Lexend', sans-serif;
    --font-accent: 'Cormorant Garamond', serif;
    --radius-sm: 12px;
    --radius-md: 18px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --radius-pill: 100px;
    --shadow-soft: 0 4px 24px rgba(45, 52, 54, 0.06);
    --shadow-lifted: 0 8px 40px rgba(45, 52, 54, 0.08);
    --shadow-sage: 0 4px 20px rgba(197, 217, 188, 0.35);
    --shadow-blush: 0 4px 20px rgba(232, 160, 191, 0.2);
    --shadow-inner: inset 0 2px 6px rgba(45, 52, 54, 0.05);
    --transition-gentle: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font-primary);
    color: var(--charcoal);
    background-color: var(--sage);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .bg-blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    will-change: transform;
  }

  .blob-1 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--cream-warm) 0%, transparent 70%);
    top: -10%;
    left: -10%;
    animation: blobDrift1 18s ease-in-out infinite;
  }

  .blob-2 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--blush-pale) 0%, transparent 70%);
    top: 30%;
    right: -8%;
    animation: blobDrift2 22s ease-in-out infinite;
  }

  .blob-3 {
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, var(--sage-muted) 0%, transparent 70%);
    bottom: -5%;
    left: 20%;
    animation: blobDrift3 20s ease-in-out infinite;
  }

  .blob-4 {
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, var(--cream) 0%, transparent 70%);
    top: 55%;
    left: -5%;
    animation: blobDrift4 25s ease-in-out infinite;
  }

  .blob-5 {
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, var(--blush-light) 0%, transparent 70%);
    top: -5%;
    right: 25%;
    opacity: 0.35;
    animation: blobDrift5 23s ease-in-out infinite;
  }

  @keyframes blobDrift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, 30px) scale(1.05); }
    66% { transform: translate(-20px, 50px) scale(0.95); }
  }

  @keyframes blobDrift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-30px, -40px) scale(1.08); }
    66% { transform: translate(20px, 30px) scale(0.97); }
  }

  @keyframes blobDrift3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(35px, -25px) scale(1.03); }
    66% { transform: translate(-15px, -40px) scale(0.96); }
  }

  @keyframes blobDrift4 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(25px, -35px) scale(1.06); }
  }

  @keyframes blobDrift5 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 25px) scale(1.04); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 440px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- Coffee Bean Character --- */

  .bean-wrap {
    margin-bottom: 32px;
    animation: beanBreathe 3.5s ease-in-out infinite;
    cursor: default;
  }

  .bean-wrap:hover .bean-body {
    transform: rotate(-6deg);
  }

  .bean-wrap:hover .bean-face {
    transform: scale(1.05);
  }

  @keyframes beanBreathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .bean {
    position: relative;
    width: 72px;
    height: 72px;
  }

  .bean-body {
    width: 72px;
    height: 72px;
    background: var(--terracotta);
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    position: relative;
    box-shadow:
      0 6px 20px rgba(193, 121, 107, 0.3),
      inset 0 -4px 8px rgba(0,0,0,0.08),
      inset 0 4px 8px rgba(255,255,255,0.12);
    transition: transform var(--transition-gentle);
  }

  .bean-line {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 32px;
    background: rgba(0,0,0,0.12);
    border-radius: 2px;
  }

  .bean-line::before,
  .bean-line::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 14px;
    background: rgba(0,0,0,0.12);
    border-radius: 2px;
  }

  .bean-line::before {
    top: 0;
    left: -1px;
    transform: rotate(12deg);
    transform-origin: top center;
  }

  .bean-line::after {
    bottom: 0;
    left: -1px;
    transform: rotate(-12deg);
    transform-origin: bottom center;
  }

  .bean-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transition: transform var(--transition-gentle);
  }

  .bean-eye {
    position: absolute;
    width: 6px;
    height: 7px;
    background: var(--charcoal);
    border-radius: 50%;
    top: 28px;
  }

  .bean-eye-left {
    left: 20px;
  }

  .bean-eye-right {
    right: 20px;
  }

  .bean-cheek {
    position: absolute;
    width: 10px;
    height: 6px;
    background: rgba(232, 160, 191, 0.45);
    border-radius: 50%;
    top: 38px;
  }

  .bean-cheek-left {
    left: 13px;
  }

  .bean-cheek-right {
    right: 13px;
  }

  .bean-mouth {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 6px;
    border: 2px solid var(--charcoal);
    border-top: none;
    border-radius: 0 0 12px 12px;
  }

  /* --- Steam wisps --- */

  .steam-wrap {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    pointer-events: none;
  }

  .steam {
    width: 3px;
    height: 16px;
    background: rgba(197, 217, 188, 0.5);
    border-radius: 3px;
    animation: steamRise 2.5s ease-in-out infinite;
  }

  .steam:nth-child(1) { animation-delay: 0s; height: 14px; }
  .steam:nth-child(2) { animation-delay: 0.6s; height: 18px; }
  .steam:nth-child(3) { animation-delay: 1.2s; height: 12px; }

  @keyframes steamRise {
    0% { opacity: 0; transform: translateY(4px) scaleX(1); }
    30% { opacity: 0.6; }
    70% { opacity: 0.3; transform: translateY(-10px) scaleX(1.5); }
    100% { opacity: 0; transform: translateY(-18px) scaleX(0.5); }
  }

  /* --- Header --- */

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: var(--font-primary);
    font-weight: 300;
    font-size: 1.75rem;
    letter-spacing: -0.01em;
    color: var(--charcoal);
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .header h1 strong {
    font-weight: 600;
    color: var(--terracotta);
  }

  .header .tagline {
    font-family: var(--font-accent);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--charcoal-muted);
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* --- Search Area --- */

  .search-section {
    width: 100%;
    margin-bottom: 36px;
  }

  .search-label {
    display: block;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--charcoal-muted);
    margin-bottom: 10px;
    padding-left: 4px;
    letter-spacing: 0.02em;
  }

  .search-box {
    width: 100%;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 16px 52px 16px 20px;
    font-family: var(--font-primary);
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--charcoal);
    background: var(--cream);
    border: 1.5px solid var(--sage-deep);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-inner), var(--shadow-sage);
    outline: none;
    transition: all var(--transition-gentle);
    -webkit-appearance: none;
  }

  .search-input::placeholder {
    color: var(--charcoal-muted);
    opacity: 0.55;
    font-weight: 300;
  }

  .search-input:focus {
    border-color: var(--blush-light);
    box-shadow: var(--shadow-inner), var(--shadow-blush), 0 0 0 3px rgba(232, 160, 191, 0.1);
  }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border: none;
    background: var(--terracotta);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-gentle);
    box-shadow: 0 2px 10px rgba(193, 121, 107, 0.25);
  }

  .search-btn:hover {
    background: var(--terracotta-warm);
    transform: translateY(-50%) scale(1.06);
    box-shadow: 0 4px 16px rgba(193, 121, 107, 0.35);
  }

  .search-btn:active {
    transform: translateY(-50%) scale(0.97);
  }

  .search-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--cream);
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .search-hint {
    margin-top: 10px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--charcoal-muted);
    opacity: 0.6;
    font-weight: 300;
  }

  .use-location-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 14px;
    padding: 8px 18px;
    font-family: var(--font-primary);
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--charcoal-soft);
    background: rgba(255, 253, 247, 0.6);
    border: 1px solid var(--sage-deep);
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition-gentle);
    backdrop-filter: blur(4px);
  }

  .use-location-btn:hover {
    background: rgba(255, 253, 247, 0.9);
    border-color: var(--blush-light);
    color: var(--terracotta);
    box-shadow: var(--shadow-soft);
  }

  .use-location-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .search-section-center {
    display: flex;
    justify-content: center;
  }

  /* --- Status Message --- */

  .status-msg {
    text-align: center;
    margin-bottom: 28px;
    font-family: var(--font-accent);
    font-style: italic;
    font-size: 1rem;
    color: var(--charcoal-muted);
    letter-spacing: 0.01em;
    animation: fadeInUp 0.6s ease-out both;
    animation-delay: 0.3s;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* --- Decorative divider --- */

  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blush-light), transparent);
    border-radius: 2px;
    margin: 0 auto 28px;
    animation: fadeInUp 0.6s ease-out both;
    animation-delay: 0.5s;
  }

  /* --- Result Card --- */

  .result-card {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--sage-deep);
    border-radius: var(--radius-xl);
    padding: 28px 24px 24px;
    box-shadow: var(--shadow-lifted), var(--shadow-sage);
    transition: all var(--transition-gentle);
    animation: cardSlideUp 0.6s ease-out both;
    animation-delay: 0.6s;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--sage-deep), var(--blush-light), var(--terracotta-warm));
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    opacity: 0.7;
  }

  .result-card:hover {
    box-shadow: var(--shadow-lifted), 0 12px 48px rgba(197, 217, 188, 0.25);
    transform: translateY(-2px);
  }

  @keyframes cardSlideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .result-name {
    font-family: var(--font-primary);
    font-weight: 600;
    font-size: 1.2rem;
    color: var(--charcoal);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .result-badge {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    border-radius: var(--radius-pill);
    margin-left: 12px;
  }

  .result-badge.open {
    background: rgba(197, 217, 188, 0.35);
    color: #4A7A3E;
    border: 1px solid rgba(197, 217, 188, 0.6);
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6BA05E;
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .result-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.85rem;
    color: var(--charcoal-soft);
    font-weight: 400;
  }

  .meta-item svg {
    width: 15px;
    height: 15px;
    stroke: var(--charcoal-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .meta-divider {
    width: 3px;
    height: 3px;
    background: var(--charcoal-muted);
    border-radius: 50%;
    opacity: 0.5;
  }

  .result-hours {
    font-size: 0.82rem;
    color: var(--charcoal-muted);
    font-weight: 300;
    margin-bottom: 22px;
    padding-left: 1px;
  }

  .result-address {
    font-size: 0.82rem;
    color: var(--charcoal-muted);
    font-weight: 300;
    margin-bottom: 20px;
    padding-left: 1px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
  }

  .result-address svg {
    width: 14px;
    height: 14px;
    stroke: var(--charcoal-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.7;
  }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  .btn-navigate {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 24px;
    font-family: var(--font-primary);
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--cream);
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-warm) 100%);
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition-gentle);
    box-shadow: 0 4px 16px rgba(193, 121, 107, 0.3);
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
  }

  .btn-navigate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
    border-radius: inherit;
  }

  .btn-navigate:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(193, 121, 107, 0.4);
    background: linear-gradient(135deg, var(--terracotta-warm) 0%, #D99486 100%);
  }

  .btn-navigate:active {
    transform: translateY(0);
    box-shadow: 0 2px 10px rgba(193, 121, 107, 0.3);
  }

  .btn-navigate svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform var(--transition-gentle);
  }

  .btn-navigate:hover svg {
    transform: translateX(3px);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    background: var(--blush-pale);
    border: 1.5px solid var(--blush-light);
    border-radius: 50%;
    cursor: pointer;
    transition: all var(--transition-gentle);
    flex-shrink: 0;
  }

  .btn-secondary svg {
    width: 18px;
    height: 18px;
    stroke: var(--terracotta);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .btn-secondary:hover {
    background: var(--blush-light);
    border-color: var(--blush);
    transform: scale(1.06);
    box-shadow: var(--shadow-blush);
  }

  /* --- Encouragement Footer --- */

  .encouragement {
    margin-top: 40px;
    text-align: center;
    animation: fadeInUp 0.6s ease-out both;
    animation-delay: 1s;
  }

  .encouragement p {
    font-family: var(--font-accent);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--charcoal-muted);
    opacity: 0.7;
    line-height: 1.5;
  }

  /* --- Tiny decorative coffee beans scattered --- */

  .deco-beans {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .deco-bean {
    position: absolute;
    width: 10px;
    height: 13px;
    background: var(--terracotta);
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    opacity: 0.06;
  }

  .deco-bean::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1px;
    height: 7px;
    background: rgba(0,0,0,0.15);
    border-radius: 1px;
  }

  .deco-bean:nth-child(1) { top: 12%; left: 8%; transform: rotate(25deg); }
  .deco-bean:nth-child(2) { top: 28%; right: 12%; transform: rotate(-15deg); width: 8px; height: 11px; }
  .deco-bean:nth-child(3) { bottom: 18%; left: 15%; transform: rotate(40deg); }
  .deco-bean:nth-child(4) { bottom: 35%; right: 8%; transform: rotate(-30deg); width: 7px; height: 9px; }
  .deco-bean:nth-child(5) { top: 55%; left: 5%; transform: rotate(10deg); width: 9px; height: 12px; }
  .deco-bean:nth-child(6) { top: 75%; right: 15%; transform: rotate(-45deg); }

  /* --- Responsive --- */

  @media (max-width: 480px) {
    .app {
      padding: 36px 20px 56px;
    }

    .header h1 {
      font-size: 1.5rem;
    }

    .result-card {
      padding: 24px 20px 20px;
    }

    .blob-1 { width: 300px; height: 300px; }
    .blob-2 { width: 250px; height: 250px; }
    .blob-3 { width: 220px; height: 220px; }
  }

  @media (min-width: 768px) {
    .app {
      padding-top: 72px;
    }

    .header h1 {
      font-size: 2rem;
    }

    .blob {
      filter: blur(100px);
    }
  }

  /* --- Gentle loading state (just CSS, no JS) --- */

  .bean-shadow {
    width: 40px;
    height: 6px;
    background: rgba(45, 52, 54, 0.06);
    border-radius: 50%;
    margin: 0 auto;
    margin-top: -4px;
    margin-bottom: 28px;
    animation: shadowBreathe 3.5s ease-in-out infinite;
  }

  @keyframes shadowBreathe {
    0%, 100% { transform: scaleX(1); opacity: 0.6; }
    50% { transform: scaleX(0.85); opacity: 0.3; }
  }

  /* --- Rating dots --- */

  .result-rating {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-left: auto;
  }

  .rating-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--terracotta);
    opacity: 0.8;
  }

  .rating-dot.empty {
    background: var(--sage-deep);
    opacity: 0.4;
  }

  /* Selection color */
  ::selection {
    background: var(--blush-light);
    color: var(--charcoal);
  }
</style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <div class="deco-beans">
    <div class="deco-bean"></div>
    <div class="deco-bean"></div>
    <div class="deco-bean"></div>
    <div class="deco-bean"></div>
    <div class="deco-bean"></div>
    <div class="deco-bean"></div>
  </div>

  <main class="app">

    <!-- Coffee Bean Character -->
    <div class="bean-wrap" aria-hidden="true">
      <div class="bean">
        <div class="steam-wrap">
          <div class="steam"></div>
          <div class="steam"></div>
          <div class="steam"></div>
        </div>
        <div class="bean-body">
          <div class="bean-line"></div>
          <div class="bean-face">
            <div class="bean-eye bean-eye-left"></div>
            <div class="bean-eye bean-eye-right"></div>
            <div class="bean-cheek bean-cheek-left"></div>
            <div class="bean-cheek bean-cheek-right"></div>
            <div class="bean-mouth"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="bean-shadow" aria-hidden="true"></div>

    <!-- Header -->
    <header class="header">
      <h1>help, i need <strong>coffee.</strong></h1>
      <p class="tagline">we'll find you some, don't worry</p>
    </header>

    <!-- Search -->
    <section class="search-section">
      <label class="search-label" for="location-input">where are you right now?</label>
      <div class="search-box">
        <input
          type="text"
          id="location-input"
          class="search-input"
          placeholder="enter your address or neighborhood"
          value="349 E 12th St, New York"
          autocomplete="off"
        >
        <button class="search-btn" aria-label="Find coffee">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
          </svg>
        </button>
      </div>
      <div class="search-section-center">
        <button class="use-location-btn">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
          use my current location
        </button>
      </div>
    </section>

    <!-- Status -->
    <p class="status-msg">found something close by for you</p>
    <div class="divider" aria-hidden="true"></div>

    <!-- Result Card -->
    <div class="result-card">
      <div class="result-header">
        <h2 class="result-name">Blue Bottle Coffee</h2>
        <span class="result-badge open">
          <span class="badge-dot"></span>
          open
        </span>
      </div>

      <div class="result-meta">
        <span class="meta-item">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          3 min walk
        </span>
        <span class="meta-divider"></span>
        <span class="meta-item">
          <svg viewBox="0 0 24 24">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          0.2 mi
        </span>
        <div class="result-rating">
          <span class="rating-dot"></span>
          <span class="rating-dot"></span>
          <span class="rating-dot"></span>
          <span class="rating-dot"></span>
          <span class="rating-dot empty"></span>
        </div>
      </div>

      <p class="result-hours">closes at 6:00 pm today</p>

      <p class="result-address">
        <svg viewBox="0 0 24 24">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        240 E 13th St, New York, NY 10003
      </p>

      <div class="result-actions">
        <button class="btn-navigate">
          let's go
          <svg viewBox="0 0 24 24">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
        <button class="btn-secondary" aria-label="Share location">
          <svg viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Encouragement -->
    <div class="encouragement">
      <p>you got this. coffee is almost yours.</p>
    </div>

  </main>

  <script>
    (function () {
      var bean = document.querySelector('.bean-wrap');
      if (!bean) return;

      bean.addEventListener('mouseenter', function () {
        bean.style.animationPlayState = 'paused';
      });
      bean.addEventListener('mouseleave', function () {
        bean.style.animationPlayState = 'running';
      });

      var input = document.querySelector('.search-input');
      var btn = document.querySelector('.search-btn');
      if (input) {
        input.addEventListener('focus', function () {
          input.parentElement.style.transform = 'scale(1.01)';
          input.parentElement.style.transition = 'transform 0.3s ease';
        });
        input.addEventListener('blur', function () {
          input.parentElement.style.transform = 'scale(1)';
        });
      }

      var navBtn = document.querySelector('.btn-navigate');
      if (navBtn) {
        navBtn.addEventListener('click', function () {
          navBtn.style.transform = 'scale(0.97)';
          setTimeout(function () {
            navBtn.style.transform = '';
          }, 150);
        });
      }

      var card = document.querySelector('.result-card');
      if (card) {
        card.addEventListener('mouseenter', function () {
          var badge = card.querySelector('.badge-dot');
          if (badge) {
            badge.style.animationDuration = '1s';
          }
        });
        card.addEventListener('mouseleave', function () {
          var badge = card.querySelector('.badge-dot');
          if (badge) {
            badge.style.animationDuration = '2s';
          }
        });
      }
    })();
  </script>

</body>
</html>
