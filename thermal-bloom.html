<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Bloom — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '\2022';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--anthropic-orange);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Thermal Bloom</h1>
            <div class="subtitle">Extraction patterns in liquid suspension</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&larr; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &rarr;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">&circlearrowleft; Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Droplets</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="5000" step="250" value="3000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">3000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Bloom Size</label>
                    <div class="slider-container">
                        <input type="range" id="bloomRadius" min="0.10" max="0.50" step="0.05" value="0.30" oninput="updateParam('bloomRadius', this.value)">
                        <span class="value-display" id="bloomRadius-value">0.30</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="turbulence" min="0.001" max="0.010" step="0.001" value="0.004" oninput="updateParam('turbulence', this.value)">
                        <span class="value-display" id="turbulence-value">0.004</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Strength</label>
                    <div class="slider-container">
                        <input type="range" id="flowStrength" min="0.3" max="2.0" step="0.1" value="1.0" oninput="updateParam('flowStrength', this.value)">
                        <span class="value-display" id="flowStrength-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Viscosity</label>
                    <div class="slider-container">
                        <input type="range" id="viscosity" min="0.85" max="0.98" step="0.01" value="0.94" oninput="updateParam('viscosity', this.value)">
                        <span class="value-display" id="viscosity-value">0.94</span>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Espresso</label>
                    <div class="color-picker-container">
                        <input type="color" id="espresso" value="#2C1810" onchange="updateColor('espresso', this.value)">
                        <span class="color-value" id="espresso-value">#2C1810</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Crema</label>
                    <div class="color-picker-container">
                        <input type="color" id="crema" value="#C4956A" onchange="updateColor('crema', this.value)">
                        <span class="color-value" id="crema-value">#C4956A</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Cream</label>
                    <div class="color-picker-container">
                        <input type="color" id="cream" value="#F0E2D0" onchange="updateColor('cream', this.value)">
                        <span class="color-value" id="cream-value">#F0E2D0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row" style="margin-bottom: 8px;">
                    <button class="button" onclick="initializeSystem()">Regenerate</button>
                    <button class="button secondary" onclick="resetParameters()">Reset</button>
                </div>
                <button class="button tertiary" onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Brewing...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            particleCount: 3000,
            bloomRadius: 0.30,
            turbulence: 0.004,
            flowStrength: 1.0,
            viscosity: 0.94,
            renderFrames: 400,
            colors: {
                espresso: '#2C1810',
                crema: '#C4956A',
                cream: '#F0E2D0'
            }
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let particles = [];
        let renderFrame = 0;
        let maxFrames;
        let cx, cy;
        let palette = [];
        let regenTimeout;

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function hexToP5Color(hex) {
            let rgb = hexToRgb(hex);
            return color(rgb.r, rgb.g, rgb.b);
        }

        function buildPalette() {
            let espresso = hexToP5Color(params.colors.espresso);
            let crema = hexToP5Color(params.colors.crema);
            let cream = hexToP5Color(params.colors.cream);
            let darkRoast = lerpColor(color(10, 5, 2), espresso, 0.6);
            let midRoast = lerpColor(espresso, crema, 0.5);
            palette = [darkRoast, espresso, midRoast, crema, cream];
        }

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            cx = width / 2;
            cy = height / 2;
            initializeSystem();
            let loadingEl = document.querySelector('.loading');
            if (loadingEl) loadingEl.style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            buildPalette();

            particles = [];
            renderFrame = 0;
            maxFrames = params.renderFrames;

            let bloomCount = floor(params.particleCount * 0.65);
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new CoffeeParticle(i < bloomCount));
            }

            background(252, 247, 238);
            updateProgress(0);
            loop();
        }

        class CoffeeParticle {
            constructor(isBloom) {
                this.spawn(isBloom);
            }

            spawn(isBloom) {
                if (isBloom) {
                    let r = pow(random(), 0.7) * width * params.bloomRadius;
                    let theta = random(TWO_PI);
                    this.pos = createVector(cx + cos(theta) * r, cy + sin(theta) * r);
                    this.substance = random(0.5, 1.0);
                } else {
                    let minR = width * params.bloomRadius * 0.7;
                    let maxR = width * 0.45;
                    let r = random(minR, maxR);
                    let theta = random(TWO_PI);
                    this.pos = createVector(cx + cos(theta) * r, cy + sin(theta) * r);
                    this.substance = random(0.0, 0.4);
                }

                this.prev = this.pos.copy();
                this.vel = createVector(0, 0);
                this.age = 0;
                this.maxAge = floor(random(80, 350));
                this.noiseOff = random(1000);
            }

            update() {
                let nx = this.pos.x * params.turbulence;
                let ny = this.pos.y * params.turbulence;
                let nz = renderFrame * 0.002 + this.noiseOff * 0.01;

                let noiseAngle = noise(nx, ny, nz) * TWO_PI * 3;

                let dx = this.pos.x - cx;
                let dy = this.pos.y - cy;
                let distFromCenter = sqrt(dx * dx + dy * dy);
                let maxDist = width * 0.5;
                let normDist = constrain(distFromCenter / maxDist, 0, 1);

                let tangentAngle = atan2(dy, dx) + HALF_PI;
                let rotStrength = map(normDist, 0, 0.6, 0.5, 0.12, true) * params.flowStrength;

                let radialAngle = atan2(dy, dx);
                let bloomStrength = map(normDist, 0, params.bloomRadius, 0.25, 0.01, true) * params.flowStrength;
                bloomStrength = max(0, bloomStrength);

                let ringRadius = 0.7;
                let ringPull = 0;
                let ringDist = abs(normDist - ringRadius);
                if (ringDist < 0.1) {
                    ringPull = -0.06 * (normDist - ringRadius) / 0.1;
                }

                let fx = cos(noiseAngle) * 0.5 * params.flowStrength
                       + cos(tangentAngle) * rotStrength
                       + cos(radialAngle) * (bloomStrength + ringPull);
                let fy = sin(noiseAngle) * 0.5 * params.flowStrength
                       + sin(tangentAngle) * rotStrength
                       + sin(radialAngle) * (bloomStrength + ringPull);

                this.vel.add(createVector(fx * 0.25, fy * 0.25));
                this.vel.mult(params.viscosity);
                this.vel.limit(2.5);

                this.prev = this.pos.copy();
                this.pos.add(this.vel);
                this.age++;
            }

            display() {
                let speed = this.vel.mag();

                let ageFactor = 1;
                if (this.age < 15) ageFactor = this.age / 15;
                if (this.age > this.maxAge - 25) ageFactor = (this.maxAge - this.age) / 25;
                ageFactor = constrain(ageFactor, 0, 1);

                let alpha = map(speed, 0, 2, 12, 4) * ageFactor;

                let idx = this.substance * (palette.length - 1);
                let lo = constrain(floor(idx), 0, palette.length - 2);
                let hi = lo + 1;
                let t = idx - lo;
                let c = lerpColor(palette[lo], palette[hi], t);

                stroke(red(c), green(c), blue(c), alpha);
                strokeWeight(map(speed, 0, 2, 1.4, 0.4));
                line(this.prev.x, this.prev.y, this.pos.x, this.pos.y);
            }

            isDead() {
                return this.age > this.maxAge ||
                       this.pos.x < -20 || this.pos.x > width + 20 ||
                       this.pos.y < -20 || this.pos.y > height + 20;
            }

            respawn() {
                this.spawn(random() < 0.65);
            }
        }

        function draw() {
            if (renderFrame >= maxFrames) {
                noLoop();
                updateProgress(100);
                return;
            }

            noFill();

            for (let p of particles) {
                p.update();
                p.display();
                if (p.isDead()) {
                    p.respawn();
                }
            }

            renderFrame++;

            if (renderFrame % 20 === 0) {
                updateProgress((renderFrame / maxFrames) * 100);
            }
        }

        function updateProgress(pct) {
            let el = document.getElementById('progress-fill');
            if (el) el.style.width = pct + '%';
        }

        function updateParam(name, value) {
            let numVal = parseFloat(value);
            params[name] = numVal;
            let display = document.getElementById(name + '-value');
            if (display) {
                display.textContent = numVal < 0.1 ? numVal.toFixed(3) : numVal < 10 ? numVal.toFixed(2) : numVal;
            }
            clearTimeout(regenTimeout);
            regenTimeout = setTimeout(function() { initializeSystem(); }, 400);
        }

        function updateColor(colorId, value) {
            params.colors[colorId] = value;
            let display = document.getElementById(colorId + '-value');
            if (display) display.textContent = value;
            clearTimeout(regenTimeout);
            regenTimeout = setTimeout(function() { initializeSystem(); }, 400);
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('bloomRadius').value = params.bloomRadius;
            document.getElementById('bloomRadius-value').textContent = params.bloomRadius.toFixed(2);
            document.getElementById('turbulence').value = params.turbulence;
            document.getElementById('turbulence-value').textContent = params.turbulence.toFixed(3);
            document.getElementById('flowStrength').value = params.flowStrength;
            document.getElementById('flowStrength-value').textContent = params.flowStrength.toFixed(1);
            document.getElementById('viscosity').value = params.viscosity;
            document.getElementById('viscosity-value').textContent = params.viscosity.toFixed(2);

            document.getElementById('espresso').value = params.colors.espresso;
            document.getElementById('espresso-value').textContent = params.colors.espresso;
            document.getElementById('crema').value = params.colors.crema;
            document.getElementById('crema-value').textContent = params.colors.crema;
            document.getElementById('cream').value = params.colors.cream;
            document.getElementById('cream-value').textContent = params.colors.cream;

            updateSeedDisplay();
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas('thermal-bloom-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
